app-id: group.theimmersive.RustNv
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: rust-nv

finish-args:
  - --socket=wayland
  - --socket=x11
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.FileManager1

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  build-args:
    - --share=network
  env:
    CARGO_HOME: /run/build/rust-nv/cargo

modules:
  - name: rust-nv
    buildsystem: simple
    build-commands:
      - cargo build --release
      - install -Dm755 target/release/rust-nv /app/bin/rust-nv
      - install -Dm644 packaging/linux/group.theimmersive.RustNv.desktop /app/share/applications/group.theimmersive.RustNv.desktop
      - install -Dm644 logo.png /app/share/icons/hicolor/512x512/apps/group.theimmersive.RustNv.png
      - install -Dm644 packaging/linux/group.theimmersive.RustNv.metainfo.xml /app/share/metainfo/group.theimmersive.RustNv.metainfo.xml
    sources:
      - type: dir
        path: ../..
